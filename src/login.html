<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite 2D – Přihlášení</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas#stars {
            position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none;
        }
        .container {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff8855;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #00ff8888;
            letter-spacing: 4px;
            font-size: 0.85em;
            margin-bottom: 50px;
        }
        .card {
            background: rgba(0, 255, 136, 0.04);
            border: 1px solid #00ff8833;
            border-radius: 4px;
            padding: 40px;
            width: 380px;
            backdrop-filter: blur(10px);
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #00ff8833;
        }
        .tab-btn {
            flex: 1; padding: 10px;
            background: none; border: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9em;
            color: #00ff8855;
            cursor: pointer;
            letter-spacing: 2px;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .tab-btn.active { color: #00ff88; border-bottom-color: #00ff88; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #00ff8888;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,255,136,0.05);
            border: 1px solid #00ff8844;
            border-radius: 2px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            color: #00ff88;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #00ff88; background: rgba(0,255,136,0.08); }
        .btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00ff88;
            border-radius: 2px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 3px;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: #00ff8822; box-shadow: 0 0 20px #00ff8844; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .message {
            margin-top: 14px;
            padding: 10px;
            border-radius: 2px;
            font-size: 0.8em;
            letter-spacing: 1px;
            display: none;
        }
        .message.error { background: rgba(255,50,50,0.1); border: 1px solid #ff333366; color: #ff6666; display: block; }
        .message.success { background: rgba(0,255,136,0.1); border: 1px solid #00ff8866; color: #00ff88; display: block; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
    <h1>ELITE 2D</h1>
    <p class="subtitle">DEEP SPACE MULTIPLAYER</p>
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">[ PŘIHLÁSIT ]</button>
            <button class="tab-btn" onclick="switchTab('register')">[ REGISTROVAT ]</button>
        </div>
        <div class="panel active" id="panel-login">
            <div class="form-group">
                <label>// IDENTIFIKÁTOR PILOTA</label>
                <input type="text" id="login-username" placeholder="pilot_name" autocomplete="username">
            </div>
            <div class="form-group">
                <label>// PŘÍSTUPOVÝ KÓD</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn" id="login-btn" onclick="handleLogin()">ZAHÁJIT PŘIHLÁŠENÍ</button>
            <div class="message" id="login-message"></div>
        </div>
        <div class="panel" id="panel-register">
            <div class="form-group">
                <label>// IDENTIFIKÁTOR PILOTA (MIN. 3)</label>
                <input type="text" id="reg-username" placeholder="pilot_name" autocomplete="username">
            </div>
            <div class="form-group">
                <label>// PŘÍSTUPOVÝ KÓD (MIN. 6)</label>
                <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>// POTVRDIT KÓD</label>
                <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password">
            </div>
            <button class="btn" id="reg-btn" onclick="handleRegister()">VYTVOŘIT PILOTA</button>
            <div class="message" id="reg-message"></div>
        </div>
    </div>
</div>
<script>
    // Starfield background
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 300}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        a: Math.random()
    }));
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.a += 0.005 * (Math.random() - 0.5);
            s.a = Math.max(0.1, Math.min(1, s.a));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${s.a})`;
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    fetch('/api/me').then(r => { if (r.ok) window.location.href = '/'; });

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) =>
            b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
    }

    function showMessage(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message ${type}`;
    }

    async function handleLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');
        if (!username || !password) return showMessage('login-message', 'VYPLŇ VŠECHNA POLE', 'error');
        btn.disabled = true; btn.textContent = 'OVĚŘUJI...';
        try {
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
            const data = await res.json();
            if (res.ok) { showMessage('login-message', '✓ PŘIHLÁŠENÍ ÚSPĚŠNÉ', 'success'); setTimeout(() => window.location.href = '/', 800); }
            else { showMessage('login-message', data.message, 'error'); btn.disabled = false; btn.textContent = 'ZAHÁJIT PŘIHLÁŠENÍ'; }
        } catch(e) { showMessage('login-message', 'CHYBA SERVERU', 'error'); btn.disabled = false; btn.textContent = 'ZAHÁJIT PŘIHLÁŠENÍ'; }
    }

    async function handleRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;
        const btn = document.getElementById('reg-btn');
        if (!username || !password || !password2) return showMessage('reg-message', 'VYPLŇ VŠECHNA POLE', 'error');
        if (password !== password2) return showMessage('reg-message', 'HESLA SE NESHODUJÍ', 'error');
        btn.disabled = true; btn.textContent = 'REGISTRUJI...';
        try {
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
            const data = await res.json();
            if (res.ok) {
                showMessage('reg-message', '✓ PILOT VYTVOŘEN', 'success');
                setTimeout(async () => {
                    await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
                    window.location.href = '/';
                }, 800);
            } else { showMessage('reg-message', data.message, 'error'); btn.disabled = false; btn.textContent = 'VYTVOŘIT PILOTA'; }
        } catch(e) { showMessage('reg-message', 'CHYBA SERVERU', 'error'); btn.disabled = false; btn.textContent = 'VYTVOŘIT PILOTA'; }
    }

    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('panel-login').classList.contains('active')) handleLogin();
        else handleRegister();
    });
</script>
</body>
</html>
