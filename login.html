<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite 2D – Přihlášení</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Share Tech Mono',monospace;background:#fff;color:#000;
            min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
            overflow:hidden}
        canvas#bg{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
        .wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
        h1{font-family:'Orbitron',sans-serif;font-size:3.2em;font-weight:900;color:#000;
            letter-spacing:8px;margin-bottom:6px}
        .sub{color:#bbb;letter-spacing:4px;font-size:.8em;margin-bottom:44px}
        .card{background:#fff;border:1px solid #ddd;border-radius:4px;padding:36px;width:360px;
            box-shadow:0 4px 30px rgba(0,0,0,.07)}
        .tabs{display:flex;margin-bottom:26px;border-bottom:1px solid #eee}
        .tab-btn{flex:1;padding:9px;background:none;border:none;
            font-family:'Share Tech Mono',monospace;font-size:.82em;color:#bbb;cursor:pointer;
            letter-spacing:2px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
        .tab-btn.active{color:#000;border-bottom-color:#000}
        .fg{margin-bottom:18px}
        label{display:block;font-size:.7em;letter-spacing:2px;color:#bbb;margin-bottom:7px}
        input{width:100%;padding:10px 13px;background:#fff;border:1px solid #ddd;border-radius:2px;
            font-family:'Share Tech Mono',monospace;font-size:.95em;color:#000;outline:none;transition:border-color .2s}
        input:focus{border-color:#000}
        .btn{width:100%;padding:11px;background:#000;border:none;border-radius:2px;
            font-family:'Orbitron',sans-serif;font-size:.8em;font-weight:700;letter-spacing:3px;
            color:#fff;cursor:pointer;transition:all .2s;margin-top:8px}
        .btn:hover{background:#333}
        .btn:disabled{opacity:.4;cursor:not-allowed}
        .message{margin-top:12px;padding:9px 12px;border-radius:2px;font-size:.78em;letter-spacing:1px;display:none}
        .message.error{background:#fff5f5;border:1px solid #ffcdd2;color:#c00;display:block}
        .message.success{background:#f5fff5;border:1px solid #c8e6c9;color:#2a7a2a;display:block}
        .panel{display:none}.panel.active{display:block}
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
    <h1>ELITE 2D</h1>
    <p class="sub">DEEP SPACE MULTIPLAYER</p>
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="sw('login')">[ PŘIHLÁSIT ]</button>
            <button class="tab-btn" onclick="sw('register')">[ REGISTROVAT ]</button>
        </div>
        <div class="panel active" id="panel-login">
            <div class="fg"><label>// PILOT ID</label><input type="text" id="lu" placeholder="jméno" autocomplete="username"></div>
            <div class="fg"><label>// PŘÍSTUPOVÝ KÓD</label><input type="password" id="lp" placeholder="••••••" autocomplete="current-password"></div>
            <button class="btn" id="lb" onclick="login()">PŘIHLÁSIT</button>
            <div class="message" id="lm"></div>
        </div>
        <div class="panel" id="panel-register">
            <div class="fg"><label>// PILOT ID (min. 3)</label><input type="text" id="ru" placeholder="jméno" autocomplete="username"></div>
            <div class="fg"><label>// KÓD (min. 6)</label><input type="password" id="rp" placeholder="••••••" autocomplete="new-password"></div>
            <div class="fg"><label>// POTVRDIT KÓD</label><input type="password" id="rp2" placeholder="••••••" autocomplete="new-password"></div>
            <button class="btn" id="rb" onclick="register()">VYTVOŘIT PILOTA</button>
            <div class="message" id="rm"></div>
        </div>
    </div>
</div>
<script>
    // B&W starfield
    const c=document.getElementById('bg');
    const cx=c.getContext('2d');
    c.width=window.innerWidth; c.height=window.innerHeight;
    const stars=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+0.2,a:Math.random()*.4+.05}));
    (function tick(){cx.clearRect(0,0,c.width,c.height);
        stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(0,0,0,${s.a})`;cx.fill();});
        requestAnimationFrame(tick);})();

    fetch('/api/me').then(r=>{if(r.ok)window.location.href='/';});

    function sw(tab){
        document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
    }
    function smsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className=`message ${type}`;}

    async function login(){
        const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
        const b=document.getElementById('lb');
        if(!u||!p)return smsg('lm','Vyplň všechna pole.','error');
        b.disabled=true;b.textContent='OVĚŘUJI...';
        try{
            const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            const d=await r.json();
            if(r.ok){smsg('lm','✓ OK','success');setTimeout(()=>window.location.href='/',600);}
            else{smsg('lm',d.message,'error');b.disabled=false;b.textContent='PŘIHLÁSIT';}
        }catch(e){smsg('lm','Chyba serveru.','error');b.disabled=false;b.textContent='PŘIHLÁSIT';}
    }
    async function register(){
        const u=document.getElementById('ru').value.trim(),p=document.getElementById('rp').value,p2=document.getElementById('rp2').value;
        const b=document.getElementById('rb');
        if(!u||!p||!p2)return smsg('rm','Vyplň všechna pole.','error');
        if(p!==p2)return smsg('rm','Hesla se neshodují.','error');
        b.disabled=true;b.textContent='REGISTRUJI...';
        try{
            const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            const d=await r.json();
            if(r.ok){
                smsg('rm','✓ Pilot vytvořen','success');
                setTimeout(async()=>{
                    await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
                    window.location.href='/';
                },700);
            }else{smsg('rm',d.message,'error');b.disabled=false;b.textContent='VYTVOŘIT PILOTA';}
        }catch(e){smsg('rm','Chyba serveru.','error');b.disabled=false;b.textContent='VYTVOŘIT PILOTA';}
    }
    document.addEventListener('keydown',e=>{
        if(e.key!=='Enter')return;
        if(document.getElementById('panel-login').classList.contains('active'))login();else register();
    });
</script>
</body>
</html>
